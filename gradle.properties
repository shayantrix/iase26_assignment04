kotlin.code.style=official
# JDK 25 daemon-JVM flags (the launcher gets the same via GRADLE_OPTS in mise.toml):
# --enable-native-access for Gradle's native-platform library, and
# --sun-misc-unsafe-memory-access=allow for the ktlint engine detekt runs in-process, whose
# bundled Kotlin compiler still calls the deprecated sun.misc.Unsafe::objectFieldOffset.
org.gradle.jvmargs=--enable-native-access=ALL-UNNAMED --sun-misc-unsafe-memory-access=allow
